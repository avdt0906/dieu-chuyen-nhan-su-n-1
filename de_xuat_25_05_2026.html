const _gdkv={};

function renderCard(t){
  const gg=cg(t.gg),gn=cg(t.gn),col=gdkvColor(t.gg),ac=t.cung?col:'#F59E0B';
  return `<div class="card ${t.cung?'':'cross-gdkv'}" data-gg="${gg}" data-gn="${gn}" data-sg="${t.sg}" data-sn="${t.sn}" data-vitri="${t.vitri}">
  <div class="card-accent" style="background:${ac}"></div>
  <div class="card-top">
    <div class="rank-badge">${t.rank}</div>
    <span class="vitri-badge ${t.vitri}">${t.vitri}</span>
    ${t.hist?'<span class="history-badge">✓ Từng làm</span>':''}
    ${t.cung?'<span class="same-gdkv-badge" style="color:'+col+'">● Cùng GĐKV</span>':'<span class="cross-gdkv-badge">⇄ Khác GĐKV</span>'}
    <span class="score-num">⭐ ${t.score}</span>
  </div>
  <div class="salon-flow">
    <div class="salon-box">
      <div class="salon-num">${sName(t.sg)}</div>
      <div class="salon-gdkv" style="color:${gdkvColor(t.gg)}">${gg} · S${t.sg}</div>
      <div class="salon-stats"><span class="salon-stat">${t.nv_g} NV</span><span class="salon-stat">${t.kpn_g} KH/NV</span><span class="nhom-tag nhom-${t.ng}">${t.ng==='Lon'?'Lớn':t.ng}</span></div>
    </div>
    <div class="arrow-col">→</div>
    <div class="salon-box">
      <div class="salon-num">${sName(t.sn)}</div>
      <div class="salon-gdkv" style="color:${gdkvColor(t.gn)}">${gn} · S${t.sn}</div>
      <div class="salon-stats"><span class="salon-stat">${t.nv_n} NV</span><span class="salon-stat ${t.kpn_n>=10?'overload':''}">${t.kpn_n} KH/NV</span><span class="nhom-tag nhom-${t.nn}">${t.nn==='Lon'?'Lớn':t.nn}</span></div>
    </div>
  </div>
  <div class="card-footer">
    <span class="nv-info">NV #${t.nv_id}${t.aov_nv>0?' · AOV '+fmtNum(t.aov_nv)+'đ':''}</span>
    <span class="km-badge">📍 ${t.km} km</span>
    <span class="delta-dt">+${fmtDT(t.ddt)}</span>
  </div>
</div>`;}

function renderCB(cb){
  const col=gdkvColor(cb.gdkv),mx=Math.max(45,cb.kpn_now+5),gg=cg(cb.gdkv);
  return `<div class="b-card" data-salon="${cb.salon}" data-vitri="${cb.vitri}" data-gdkv="${gg}">
  <div class="b-card-header"><span class="alert-icon">🔴</span>
    <div><div class="b-salon-name">${sName(cb.salon)} — ${cb.vitri} <span style="font-size:13px;font-weight:400;color:var(--text-dim)">(S${cb.salon})</span></div>
    <div class="b-gdkv" style="color:${col}">${gg} · Nhóm ${cb.nhom==='Lon'?'Lớn':cb.nhom}</div></div>
  </div>
  <div class="load-bar-wrap">
    <div class="load-label"><span>Hiện tại: ${cb.kpn_now} KH/NV (ngưỡng ${cb.nguong})</span><span>${cb.nv_lam} NV</span></div>
    <div class="load-bar"><div class="load-fill over" style="width:${Math.min(100,cb.kpn_now/mx*100)}%"></div></div>
    <div class="load-label" style="margin-top:6px"><span>Sau khi gọi: ${cb.kpn_after} KH/NV</span><span>${cb.nv_lam+1} NV</span></div>
    <div class="load-bar"><div class="load-fill after" style="width:${Math.min(100,cb.kpn_after/mx*100)}%"></div></div>
  </div>
  <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">${cb.nv_nghi} NV nghỉ có thể được gọi</div>
  <div class="b-metrics">
    <div class="b-metric"><div class="b-metric-val neu">${fmtNum(cb.inc_dt)}</div><div class="b-metric-lbl">Incremental DT</div></div>
    <div class="b-metric"><div class="b-metric-val pos">${cb.nv_lam+1} NV</div><div class="b-metric-lbl">Sau khi gọi thêm</div></div>
  </div>
</div>`;}

function renderTab(key){
  const d=DATES[key],ts=d.transfers;
  _gdkv[key]='ALL';
  const totalDDT=ts.reduce((a,t)=>a+t.ddt,0);
  const alMap={};
  ts.forEach(t=>{
    const k=t.sn+'_'+t.vitri;
    if(!alMap[k]) alMap[k]={salon:t.sn,vitri:t.vitri,gdkv:t.gn,nhom:t.nn,nv:t.nv_n,kpn:t.kpn_n,cnt:0,hasCall:false};
    alMap[k].cnt++;
  });
  d.callbacks.forEach(cb=>{
    const k=cb.salon+'_'+cb.vitri;
    if(!alMap[k]) alMap[k]={salon:cb.salon,vitri:cb.vitri,gdkv:cb.gdkv,nhom:cb.nhom,nv:cb.nv_lam,kpn:cb.kpn_now,cnt:0,hasCall:true};
    else alMap[k].hasCall=true;
  });
  const als=Object.values(alMap).sort((a,b)=>b.kpn-a.kpn);
  const gdkvSet=[...new Set([...ts.map(t=>cg(t.gg)),...ts.map(t=>cg(t.gn)),...d.callbacks.map(c=>cg(c.gdkv))])].filter(Boolean).sort();
  const byG={};ts.forEach(t=>{const g=cg(t.gg);if(!byG[g])byG[g]={count:0,ddt:0};byG[g].count++;byG[g].ddt+=t.ddt;});
  const gs=Object.entries(byG).sort((a,b)=>b[1].ddt-a[1].ddt);
  const alHtml=als.map(a=>{
    const gg=cg(a.gdkv),col=gdkvColor(a.gdkv),total=a.cnt+(a.hasCall?1:0);
    return `<div class="alarm-card" data-gdkv="${gg}" style="border-left-color:${col}" onclick="filterBySalon('${key}',${a.salon},'${a.vitri}',this)" title="Click để lọc gợi ý bên dưới">
  <div class="alarm-top">
    <span class="alarm-name">${sName(a.salon)}</span>
    <span class="vitri-badge ${a.vitri}">${a.vitri}</span>
    <span class="nhom-tag nhom-${a.nhom}">${a.nhom==='Lon'?'Lớn':a.nhom}</span>
    <span class="selected-badge">✓ Đang lọc</span>
  </div>
  <div class="alarm-gdkv" style="color:${col}">${gg}</div>
  <div class="alarm-foot">
    <span>${a.nv} NV · <b>${a.kpn} KH/NV</b></span>
    <span class="alarm-tag">${total} gợi ý</span>
  </div>
</div>`;
  }).join('');
  document.getElementById(key).innerHTML=`
<div class="summary-bar">
  <div class="stat-card highlight">
    <div class="stat-label">Tổng ΔDT Điều chuyển</div>
    <div class="stat-value">${fmtNum(Math.round(totalDDT/1000))}K</div>
    <div class="stat-sub">${ts.length} đề xuất · ${gdkvSet.length} GĐKV</div>
  </div>
  ${gs.slice(0,5).map(([g,v])=>`<div class="stat-card" style="border-left:3px solid ${gdkvColor(g)}"><div class="stat-label" style="color:${gdkvColor(g)}">${g}</div><div class="stat-value" style="font-size:20px">${fmtNum(Math.round(v.ddt/1000))}K</div><div class="stat-sub">${v.count} cặp</div></div>`).join('')}
</div>
<div class="filter-row" id="filter-${key}">
  <span class="filter-label">GĐKV:</span>
  <button class="chip chip-all active" onclick="filterAll('${key}','ALL')">Tất cả</button>
  ${gdkvSet.map(g=>`<button class="chip active" style="background:${gdkvColor(g)}22;color:${gdkvColor(g)};border-color:${gdkvColor(g)}88" onclick="filterAll('${key}','${g}')">${g}</button>`).join('')}
</div>
<div class="section-header">
  <div class="section-icon warn">⚠️</div>
  <span class="section-title">Salon Báo Động — Ít Nhân Sự</span>
  <span class="section-count">${als.length} salon·vitri</span>
  <span class="section-hint">· Click vào salon để lọc gợi ý bên dưới</span>
</div>
<div class="alarm-grid" id="alarms-${key}">${alHtml||'<p class="empty-note">Không có salon báo động</p>'}</div>
<div class="section-sep"><hr class="divider">
<div class="section-header"><div class="section-icon a">🔄</div><span class="section-title">Hướng 1 — Điều chuyển Nhân sự</span><span class="section-count" id="cnt-tr-${key}">${ts.length} đề xuất</span></div>
<div class="cards-grid" id="cards-${key}">${ts.map(renderCard).join('')}</div></div>
${d.callbacks.length>0?`<div class="section-sep"><hr class="divider"><div class="section-header"><div class="section-icon b">🔴</div><span class="section-title">Hướng 2 — Gọi NV Nghỉ Đi Làm Thêm</span><span class="section-count" id="cnt-cb-${key}">${d.callbacks.length} đề xuất</span></div><div class="b-cards" id="cbs-${key}">${d.callbacks.map(renderCB).join('')}</div></div>`:''}
`;}

function filterAll(key,gdkv){
  _gdkv[key]=gdkv;
  document.querySelectorAll('#alarms-'+key+' .alarm-card').forEach(c=>c.classList.remove('selected'));
  document.querySelectorAll('#filter-'+key+' .chip').forEach(c=>c.classList.remove('active'));
  if(gdkv==='ALL') document.querySelector('#filter-'+key+' .chip-all').classList.add('active');
  else document.querySelectorAll('#filter-'+key+' .chip').forEach(c=>{if(c.textContent.trim()===gdkv)c.classList.add('active');});
  const all=gdkv==='ALL';
  document.querySelectorAll('#alarms-'+key+' .alarm-card').forEach(c=>{
    (all||c.dataset.gdkv===gdkv)?c.removeAttribute('data-hidden'):c.setAttribute('data-hidden','true');
  });
  document.querySelectorAll('#cards-'+key+' .card').forEach(c=>{
    (all||c.dataset.gg===gdkv||c.dataset.gn===gdkv)?c.removeAttribute('data-hidden'):c.setAttribute('data-hidden','true');
  });
  const cbEl=document.getElementById('cbs-'+key);
  if(cbEl) cbEl.querySelectorAll('.b-card').forEach(c=>{
    (all||c.dataset.gdkv===gdkv)?c.removeAttribute('data-hidden'):c.setAttribute('data-hidden','true');
  });
}

function filterBySalon(key,salonId,vitri,el){
  const isSelected=el.classList.contains('selected');
  document.querySelectorAll('#alarms-'+key+' .alarm-card').forEach(c=>c.classList.remove('selected'));
  if(isSelected){filterAll(key,_gdkv[key]||'ALL');return;}
  el.classList.add('selected');
  const sid=String(salonId);
  document.querySelectorAll('#cards-'+key+' .card').forEach(c=>{
    const show=(c.dataset.sg===sid||c.dataset.sn===sid)&&c.dataset.vitri===vitri;
    show?c.removeAttribute('data-hidden'):c.setAttribute('data-hidden','true');
  });
  const cbEl=document.getElementById('cbs-'+key);
  if(cbEl) cbEl.querySelectorAll('.b-card').forEach(c=>{
    const show=c.dataset.salon===sid&&c.dataset.vitri===vitri;
    show?c.removeAttribute('data-hidden'):c.setAttribute('data-hidden','true');
  });
}

function switchTab(key){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab-btn[data-tabkey="'+key+'"]').classList.add('active');
  document.getElementById(key).classList.add('active');
}
window.addEventListener('DOMContentLoaded',()=>{Object.keys(DATES).forEach(renderTab);});
</script>
</body>
</html>
