<style>
  :root {

    --orange: #F97316; --orange-dim: #EA580C; --orange-glow: rgba(249,115,22,0.15);
    --green: #10B981; --red: #EF4444; --blue: #3B82F6; --amber: #F59E0B;
    --purple: #8B5CF6; --pink: #EC4899; --teal: #14B8A6; --indigo: #6366F1;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0F172A 0%, #1a1040 100%); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .logo { background: var(--orange); color: white; font-weight: 900; font-size: 18px; padding: 6px 14px; border-radius: 8px; letter-spacing: -0.5px; }
  .header-text h1 { font-size: 20px; font-weight: 700; color: var(--text); }
  .header-text p { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .header-badge { margin-left: auto; background: var(--orange-glow); border: 1px solid var(--orange); color: var(--orange); font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }

  /* TABS */
  .tabs-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; gap: 4px; }
  .tab-btn { padding: 14px 24px; font-size: 14px; font-weight: 600; color: var(--text-dim); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
  .tab-day-label { font-size: 11px; font-weight: 400; opacity: 0.7; display: block; }

  /* MAIN CONTENT */
  .tab-content { display: none; padding: 24px 32px 48px; max-width: 1400px; margin: 0 auto; }
  .tab-content.active { display: block; }

  /* SUMMARY BAR */
  .summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 26px; font-weight: 800; color: var(--text); margin-top: 4px; line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .stat-card.highlight { background: var(--orange-glow); border-color: var(--orange); }
  .stat-card.highlight .stat-value { color: var(--orange); }

  /* FILTER CHIPS */
  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text-muted); font-weight: 600; }
  .chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; opacity: 0.6; }
  .chip:hover { opacity: 0.9; }
  .chip.active { opacity: 1; }
  .chip-all { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .chip-all.active { border-color: var(--text); opacity: 1; }

  /* SECTION HEADERS */
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; margin-top: 8px; }
  .section-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .section-icon.a { background: rgba(59,130,246,0.15); }
  .section-icon.b { background: rgba(239,68,68,0.15); }
  .section-title { font-size: 16px; font-weight: 700; }
  .section-count { background: var(--surface2); border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; color: var(--text-dim); }
  .section-empty { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px; }

  /* TRANSFER CARDS */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: border-color 0.15s; position: relative; overflow: hidden; }
  .card:hover { border-color: var(--text-muted); }
  .card.cross-gdkv { border-left: 3px solid var(--amber); }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; }

  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .rank-badge { background: var(--surface2); color: var(--text-dim); font-size: 11px; font-weight: 700; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .vitri-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
  .vitri-badge.Skinner { background: rgba(59,130,246,0.2); color: #60A5FA; }
  .vitri-badge.Stylist { background: rgba(139,92,246,0.2); color: #A78BFA; }
  .same-gdkv-badge { margin-left: auto; display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--green); }
  .cross-gdkv-badge { margin-left: auto; display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--amber); }
  .score-num { background: var(--surface2); color: var(--text-dim); font-size: 11px; padding: 2px 7px; border-radius: 4px; }

  .salon-flow { display: flex; align-items: stretch; gap: 0; margin-bottom: 12px; }
  .salon-box { flex: 1; background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; min-width: 0; }
  .salon-box.nhan { position: relative; }
  .salon-num { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1; }
  .salon-gdkv { font-size: 10px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .salon-stats { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .salon-stat { font-size: 11px; color: var(--text-dim); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
  .salon-stat.overload { color: var(--red); background: rgba(239,68,68,0.1); }
  .nhom-tag { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; }
  .nhom-Lon { background: rgba(249,115,22,0.15); color: var(--orange); }
  .nhom-TB { background: rgba(59,130,246,0.15); color: var(--blue); }
  .nhom-Nho { background: rgba(148,163,184,0.15); color: var(--text-dim); }
  .arrow-col { display: flex; align-items: center; padding: 0 8px; color: var(--orange); font-size: 18px; flex-shrink: 0; }

  .card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .nv-info { font-size: 11px; color: var(--text-muted); }
  .km-badge { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 3px; }
  .delta-dt { margin-left: auto; font-size: 15px; font-weight: 800; color: var(--green); }
  .history-badge { font-size: 10px; color: var(--teal); background: rgba(20,184,166,0.1); padding: 2px 6px; border-radius: 3px; }

  .b-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .b-card { background: var(--surface); border: 1px solid rgba(239,68,68,0.3); border-left: 4px solid var(--red); border-radius: var(--radius); padding: 18px; }
  .b-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .alert-icon { font-size: 20px; }
  .b-salon-name { font-size: 17px; font-weight: 800; }
  .b-gdkv { font-size: 12px; color: var(--text-dim); }
  .load-bar-wrap { margin: 14px 0; }
  .load-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .load-bar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .load-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .load-fill.over { background: var(--red); }
  .load-fill.after { background: var(--green); }
  .b-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
  .b-metric { background: var(--surface2); border-radius: 8px; padding: 10px; text-align: center; }
  .b-metric-val { font-size: 15px; font-weight: 800; }
  .b-metric-val.pos { color: var(--green); }
  .b-metric-val.neg { color: var(--red); }
  .b-metric-val.neu { color: var(--orange); }
  .b-metric-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .card[data-hidden="true"] { display: none; }

  /* RESPONSIVE */
  @media (max-width: 768px) {

    .tab-content { padding: 16px; }
    .tabs-bar { padding: 0 16px; overflow-x: auto; }
    .cards-grid { grid-template-columns: 1fr; }
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .section-b-sep { margin-top: 32px; }

function getGDKVs(transfers) {
  const s = new Set();
  transfers.forEach(t => { s.add(cleanGDKV(t.gg)); s.add(cleanGDKV(t.gn)); });
  return [...s].sort();
}

function renderTransferCard(t) {
  const ggClean = cleanGDKV(t.gg), gnClean = cleanGDKV(t.gn);
  const color = gdkvColor(t.gg);
  const overloadN = t.kpn_n >= 10;
  const accentColor = t.cung ? color : '#F59E0B';
  return `
<div class="card ${t.cung ? '' : 'cross-gdkv'}" data-gg="${ggClean}" data-gn="${gnClean}">
  <div class="card-accent" style="background:${accentColor}"></div>
  <div class="card-top">
    <div class="rank-badge">${t.rank}</div>
    <span class="vitri-badge ${t.vitri}">${t.vitri}</span>
    ${t.hist ? '<span class="history-badge">✓ Từng làm</span>' : ''}
    ${t.cung
      ? `<span class="same-gdkv-badge" style="color:${color}">● Cùng GĐKV</span>`
      : `<span class="cross-gdkv-badge">⇄ Khác GĐKV</span>`}
    <span class="score-num">⭐ ${t.score}</span>
  </div>
  <div class="salon-flow">
    <div class="salon-box">
      <div class="salon-num">${sName(t.sg)}</div>
      <div class="salon-gdkv" style="color:${gdkvColor(t.gg)}">${ggClean} · S${t.sg}</div>
      <div class="salon-stats">
        <span class="salon-stat">${t.nv_g} NV</span>
        <span class="salon-stat">${t.kpn_g} KH/NV</span>
        <span class="nhom-tag nhom-${t.ng}">${t.ng === 'Lon' ? 'Lớn' : t.ng}</span>
      </div>
    </div>
    <div class="arrow-col">→</div>
    <div class="salon-box nhan">
      <div class="salon-num">${sName(t.sn)}</div>
      <div class="salon-gdkv" style="color:${gdkvColor(t.gn)}">${gnClean} · S${t.sn}</div>
      <div class="salon-stats">
        <span class="salon-stat">${t.nv_n} NV</span>
        <span class="salon-stat ${overloadN ? 'overload' : ''}">${t.kpn_n} KH/NV</span>
        <span class="nhom-tag nhom-${t.nn}">${t.nn === 'Lon' ? 'Lớn' : t.nn}</span>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <span class="nv-info">NV #${t.nv_id}${t.aov_nv > 0 ? ' · AOV ' + fmtNum(t.aov_nv) + 'đ' : ''}</span>
    <span class="km-badge">📍 ${t.km} km</span>
    <span class="delta-dt">+${fmtDT(t.ddt)}</span>
  </div>
</div>`;
}

function renderCallbackCard(cb) {
  const color = gdkvColor(cb.gdkv);
  const maxLoad = 25;
  const pctNow = Math.min(100, (cb.kpn_now / maxLoad) * 100);
  const pctAfter = Math.min(100, (cb.kpn_after / maxLoad) * 100);
  return `
<div class="b-card">
  <div class="b-card-header">
    <span class="alert-icon">🔴</span>
    <div>
      <div class="b-salon-name">${sName(cb.salon)} — ${cb.vitri} <span style="font-size:13px;font-weight:400;color:var(--text-dim)">(S${cb.salon})</span></div>
      <div class="b-gdkv" style="color:${color}">${cleanGDKV(cb.gdkv)} · Nhóm ${cb.nhom === 'Lon' ? 'Lớn' : cb.nhom}</div>
    </div>
  </div>
  <div class="load-bar-wrap">
    <div class="load-label"><span>Hiện tại: ${cb.kpn_now} KH/NV (ngưỡng ${cb.nguong})</span><span>${cb.nv_lam} NV đang làm</span></div>
    <div class="load-bar"><div class="load-fill over" style="width:${pctNow}%"></div></div>
    <div class="load-label" style="margin-top:6px"><span>Sau khi gọi: ${cb.kpn_after} KH/NV</span><span>${cb.nv_lam+1} NV</span></div>
    <div class="load-bar"><div class="load-fill after" style="width:${pctAfter}%"></div></div>
  </div>
  <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">${cb.nv_nghi} NV nghỉ có thể được gọi · Bonus 300K/NV</div>
  <div class="b-metrics">
    <div class="b-metric">
      <div class="b-metric-val neu">${fmtNum(cb.inc_dt)}</div>
      <div class="b-metric-lbl">Incremental DT</div>
    </div>
    <div class="b-metric">
      <div class="b-metric-val neg">−${fmtNum(cb.bonus)}</div>
      <div class="b-metric-lbl">Chi phí bonus</div>
    </div>
    <div class="b-metric">
      <div class="b-metric-val pos">+${fmtNum(cb.delta_ln)}</div>
      <div class="b-metric-lbl">ΔLN sau bonus</div>
    </div>
  </div>
</div>`;
}

function renderTab(key, data) {
  const el = document.getElementById(key);
  const ts = data.transfers;
  const totalDDT = ts.reduce((a,t) => a+t.ddt, 0);
  const gdkvSet = getGDKVs(ts);

  // Summary per GĐKV
  const byGDKV = {};
  ts.forEach(t => {
    const g = cleanGDKV(t.gg);
    if (!byGDKV[g]) byGDKV[g] = {count:0,ddt:0};
    byGDKV[g].count++;
    byGDKV[g].ddt += t.ddt;
  });
  const gdkvSorted = Object.entries(byGDKV).sort((a,b)=>b[1].ddt-a[1].ddt);

  let summaryHtml = `
<div class="summary-bar">
  <div class="stat-card highlight">
    <div class="stat-label">Tổng ΔDT Điều chuyển</div>
    <div class="stat-value">${fmtNum(Math.round(totalDDT/1000))}K</div>
    <div class="stat-sub">${ts.length} đề xuất · ${gdkvSet.length} GĐKV</div>
  </div>
  ${gdkvSorted.slice(0,5).map(([g,v]) => `
  <div class="stat-card" style="border-left:3px solid ${gdkvColor(g)}">
    <div class="stat-label" style="color:${gdkvColor(g)}">${g}</div>
    <div class="stat-value" style="font-size:20px">${fmtNum(Math.round(v.ddt/1000))}K</div>
    <div class="stat-sub">${v.count} cặp điều chuyển</div>
  </div>`).join('')}
</div>`;

  // GĐKV filter chips
  const filterHtml = `
<div class="filter-row" id="filter-${key}">
  <span class="filter-label">Lọc theo GĐKV:</span>
  <button class="chip chip-all active" onclick="filterCards('${key}','ALL')">Tất cả</button>
  ${gdkvSet.map(g => `<button class="chip active" style="background:${gdkvColor(g)}22;color:${gdkvColor(g)};border-color:${gdkvColor(g)}88" onclick="filterCards('${key}','${g}')">${g}</button>`).join('')}
</div>`;

  // Cards A
  const cardsHtml = ts.map(renderTransferCard).join('');

  // Section B
  let sectionB = '';
  if (data.callbacks.length > 0) {
    sectionB = `
<div class="section-b-sep">
  <hr class="divider">
  <div class="section-header">
    <div class="section-icon b">🔴</div>
    <span class="section-title">Hướng 2 — Gọi NV Nghỉ Đi Làm Thêm</span>
    <span class="section-count">${data.callbacks.length} đề xuất</span>
  </div>
  <div class="b-cards" id="bcards-${key}">
    ${data.callbacks.map(renderCallbackCard).join('')}
  </div>
</div>`;
  }

  el.innerHTML = `
${summaryHtml}
${filterHtml}
<div class="section-header">
  <div class="section-icon a">🔄</div>
  <span class="section-title">Hướng 1 — Điều chuyển Nhân sự</span>
  <span class="section-count">${ts.length} đề xuất</span>
</div>
<div class="cards-grid" id="cards-${key}">${cardsHtml}</div>
${sectionB}`;
}

function filterCards(tabKey, gdkv) {
  const grid = document.getElementById('cards-' + tabKey);
  const chips = document.querySelectorAll('#filter-' + tabKey + ' .chip');
  chips.forEach(c => c.classList.remove('active'));
  const allChip = document.querySelector('#filter-' + tabKey + ' .chip-all');

  if (gdkv === 'ALL') {
    allChip.classList.add('active');
    grid.querySelectorAll('.card').forEach(c => c.removeAttribute('data-hidden'));
  } else {
    chips.forEach(c => { if (c.textContent.trim() === gdkv) c.classList.add('active'); });
    grid.querySelectorAll('.card').forEach(c => {
      const gg = c.getAttribute('data-gg');
      const gn = c.getAttribute('data-gn');
      c.setAttribute('data-hidden', (gg !== gdkv && gn !== gdkv) ? 'true' : 'false');
    });
  }
}

function switchTab(key) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(key).classList.add('active');
  const idx = ['t0508','t0509','t0510'].indexOf(key);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
}

// Init
Object.entries(DATES).forEach(([key, data]) => renderTab(key, data));
</script>
</body>
